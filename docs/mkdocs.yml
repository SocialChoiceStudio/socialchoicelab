site_name: socialchoicelab (Python)
site_description: Python bindings for libscs_api — spatial social choice analysis.
site_url: https://socialchoicestudio.github.io/socialchoicelab/python/
repo_url: https://github.com/SocialChoiceStudio/socialchoicelab
repo_name: SocialChoiceStudio/socialchoicelab
docs_dir: python/api

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../python/src]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_submodules: false
            members_order: source
            heading_level: 2
  - mkdocs-jupyter:
      execute: true
      allow_errors: false
      include_source: true
      include: ["*.ipynb"]

nav:
  - Home: index.md
  - API Reference:
    - Configuration: config.md
    - Stream Manager: stream_manager.md
    - Winset: winset.md
    - Profile: profile.md
    - Distance & Utility: functions.md
    - Geometry: geometry.md
    - Voting Rules: voting_rules.md
    - Social Rankings: social.md
    - Plotting: plots.md
    - Exceptions: errors.md
  - Examples:
    - Spatial Voting Notebook: notebooks/spatial_voting.ipynb

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
