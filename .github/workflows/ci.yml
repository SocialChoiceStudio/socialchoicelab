# SocialChoiceLab CI: build, test, format check, lint, and binding checks.
#
# Jobs:
#   core          — builds libscs_api and runs all C++ tests (Ubuntu + macOS)
#   r-binding     — installs R package against pre-built libscs_api (Ubuntu + macOS)
#   python-binding — installs Python package against pre-built libscs_api (Ubuntu + macOS)

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/**'
      - 'lint.sh'
      - 'r/**'
      - 'python/**'
  pull_request:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/**'
      - 'lint.sh'
      - 'r/**'
      - 'python/**'

jobs:
  # ---------------------------------------------------------------------------
  # core — build libscs_api and run C++ tests
  # ---------------------------------------------------------------------------
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake and FetchContent
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Fix DYLD_LIBRARY_PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "DYLD_LIBRARY_PATH=" >> $GITHUB_ENV

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3-pip \
            libcgal-dev libgmp-dev libmpfr-dev
          pip3 install --break-system-packages cpplint || pip3 install --user cpplint
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake cgal
          pip3 install --break-system-packages cpplint

      - name: Format check
        run: |
          ./lint.sh format
          git diff --exit-code -- include/ src/ tests/unit/ || (echo "::error::Code is not formatted. Run ./lint.sh format locally." && exit 1)

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure -LE benchmark

      - name: Lint (strict)
        run: ./lint.sh --strict lint

      - name: Upload libscs_api artifact
        uses: actions/upload-artifact@v4
        with:
          name: libscs_api-${{ matrix.os }}
          path: |
            build/libscs_api.so
            build/libscs_api.dylib
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # r-binding — install and check the R package
  # ---------------------------------------------------------------------------
  r-binding:
    name: R binding (${{ matrix.os }})
    needs: core
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download libscs_api artifact
        uses: actions/download-artifact@v4
        with:
          name: libscs_api-${{ matrix.os }}
          path: scs_lib

      - name: Set SCS_LIB_PATH
        run: echo "SCS_LIB_PATH=${{ github.workspace }}/scs_lib" >> $GITHUB_ENV

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: |
            devtools
            roxygen2
            pkgdown
            testthat

      - name: R CMD check
        run: |
          cd r
          Rscript -e "devtools::check(error_on='error')"

  # ---------------------------------------------------------------------------
  # python-binding — install and test the Python package
  # ---------------------------------------------------------------------------
  python-binding:
    name: Python binding (${{ matrix.os }})
    needs: core
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download libscs_api artifact
        uses: actions/download-artifact@v4
        with:
          name: libscs_api-${{ matrix.os }}
          path: scs_lib

      - name: Set SCS_LIB_PATH
        run: echo "SCS_LIB_PATH=${{ github.workspace }}/scs_lib" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package and dependencies
        run: |
          pip install "./python[dev,docs]"

      - name: Run pytest
        run: pytest python/tests/ --tb=short
