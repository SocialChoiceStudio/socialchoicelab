# SocialChoiceLab CI: build, test, format check, and lint
# Item 28 — runs on push and pull_request to main (and default branch).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pre-built LLVM/clang-format for both Ubuntu and macOS (version 21; 22 not in action assets)
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      # KyleMayes sets DYLD_LIBRARY_PATH which breaks Homebrew git on macOS; clear it.
      # clang-format finds its own dylibs via RPATH so does not need this variable.
      - name: Fix DYLD_LIBRARY_PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "DYLD_LIBRARY_PATH=" >> $GITHUB_ENV

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3-pip
          pip3 install --user cpplint || pip3 install cpplint
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake
          pip3 install --break-system-packages cpplint

      - name: Format check
        run: |
          ./lint.sh format
          git diff --exit-code -- include/ src/ tests/unit/ || (echo "::error::Code is not formatted. Run ./lint.sh format locally." && exit 1)

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run tests
        run: cd build && ctest --output-on-failure -LE benchmark

      - name: Lint (strict)
        run: ./lint.sh --strict lint
